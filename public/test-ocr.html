<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OCR坐标测试</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    #canvas { border: 1px solid #ccc; max-width: 100%; }
    #results { margin-top: 20px; }
    .date-word { background: yellow; padding: 2px; margin: 2px; display: inline-block; }
    .info { margin: 10px 0; padding: 10px; background: #f0f0f0; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>OCR坐标测试</h1>
  <div class="info">
    <div>PDF文件: COF 2026-11-01.pdf</div>
    <div id="pageInfo"></div>
    <div id="status">加载中...</div>
  </div>
  
  <div style="position: relative; display: inline-block;">
    <canvas id="canvas"></canvas>
    <div id="overlay" style="position: absolute; top: 0; left: 0; pointer-events: none;"></div>
  </div>
  
  <div id="results"></div>

  <script type="module">
    import * as pdfjsLib from 'pdfjs-dist';
    import { createWorker } from 'tesseract.js';

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdfjs-dist/build/pdf.worker.min.mjs';

    const canvas = document.getElementById('canvas');
    const overlay = document.getElementById('overlay');
    const statusEl = document.getElementById('status');
    const pageInfoEl = document.getElementById('pageInfo');
    const resultsEl = document.getElementById('results');

    async function main() {
      const scale = 2.0;
      
      const response = await fetch('/test.pdf');
      const pdfData = new Uint8Array(await response.arrayBuffer());
      
      const pdf = await pdfjsLib.getDocument({ data: pdfData }).promise;
      const page = await pdf.getPage(1);
      const viewport = page.getViewport({ scale });
      const pageHeight = viewport.height / scale;
      
      pageInfoEl.textContent = `页面尺寸: ${viewport.width / scale} x ${pageHeight} pts (scale=${scale})`;
      
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      overlay.style.width = viewport.width + 'px';
      overlay.style.height = viewport.height + 'px';
      
      const ctx = canvas.getContext('2d');
      await page.render({ canvasContext: ctx, viewport }).promise;
      
      statusEl.textContent = 'OCR识别中...';
      
      const worker = await createWorker('eng');
      const result = await worker.recognize(canvas);
      await worker.terminate();
      
      statusEl.textContent = '识别完成！';
      
      const ocrData = result.data;
      console.log('OCR Data:', ocrData);
      
      const datePattern = /(\d{1,2})\s+(January|February|March|April|May|June|July|August|September|October|November|December|Jan|Feb|Mar|Apr|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[\.,]?\s+(\d{4})/i;
      
      const dateWords = [];
      const allWords = [];
      
      if (ocrData.words) {
        for (const w of ocrData.words) {
          allWords.push({
            text: w.text,
            canvasX0: w.bbox.x0,
            canvasY0: w.bbox.y0,
            canvasX1: w.bbox.x1,
            canvasY1: w.bbox.y1,
            pdfX0: w.bbox.x0 / scale,
            pdfY0: pageHeight - w.bbox.y1 / scale,
            pdfX1: w.bbox.x1 / scale,
            pdfY1: pageHeight - w.bbox.y0 / scale,
          });
        }
      }
      
      const dateMatches = ocrData.text.match(datePattern);
      resultsEl.innerHTML = '<h3>识别到的日期文本:</h3>';
      resultsEl.innerHTML += `<p>${ocrData.text.match(new RegExp(datePattern, 'gi'))?.join(', ') || '未找到'}</p>`;
      
      resultsEl.innerHTML += '<h3>包含年份的words (按Canvas坐标绘制):</h3>';
      const yearWords = allWords.filter(w => /20\d{2}/.test(w.text));
      
      for (const w of yearWords) {
        const div = document.createElement('div');
        div.style.position = 'absolute';
        div.style.left = w.canvasX0 + 'px';
        div.style.top = w.canvasY0 + 'px';
        div.style.width = (w.canvasX1 - w.canvasX0) + 'px';
        div.style.height = (w.canvasY1 - w.canvasY0) + 'px';
        div.style.border = '2px solid red';
        div.style.background = 'rgba(255, 0, 0, 0.1)';
        div.title = w.text;
        overlay.appendChild(div);
        
        resultsEl.innerHTML += `<div class="date-word">${w.text}<br>canvas: (${w.canvasX0.toFixed(0)},${w.canvasY0.toFixed(0)})-(${w.canvasX1.toFixed(0)},${w.canvasY1.toFixed(0)})<br>pdf: (${w.pdfX0.toFixed(1)},${w.pdfY0.toFixed(1)})-(${w.pdfX1.toFixed(1)},${w.pdfY1.toFixed(1)})</div>`;
      }
      
      resultsEl.innerHTML += '<h3>所有words (前50个):</h3>';
      for (let i = 0; i < Math.min(50, allWords.length); i++) {
        const w = allWords[i];
        resultsEl.innerHTML += `<span class="date-word">${w.text}</span>`;
      }
    }
    
    main().catch(e => {
      statusEl.textContent = '错误: ' + e.message;
      console.error(e);
    });
  </script>
</body>
</html>
